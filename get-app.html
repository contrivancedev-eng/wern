<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index,follow">
<title>Get WERN - Walk. Track. Empower.</title>
<meta name="description" content="Download WERN on the App Store or Google Play.">
<link rel="canonical" href="https://wernapp.com/get-app">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f766e 0%, #065f46 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 20px;
    padding: 40px 28px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .logo {
    width: 120px;
    /* height: 84px; */
    border-radius: 22px;
    /* background: #fff; */
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
 
  }
  .logo img { width: 120px; height: 62px; object-fit: contain; }
  h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .tagline { opacity: 0.85; margin-bottom: 28px; font-size: 14px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 12px;
    background: #fff;
    color: #0f766e;
    text-decoration: none;
    font-weight: 600;
    border-radius: 12px;
    font-size: 15px;
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
  .btn svg { width: 20px; height: 20px; }
  .redirecting {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 16px;
    min-height: 16px;
  }
  footer {
    margin-top: 24px;
    font-size: 11px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="https://www.wernapp.com/public/web/assets/img/logo/logo.png" alt="WERN" onerror="this.style.display='none'">
    </div>
    <h1>Get WERN</h1>
    <p class="tagline">Walk. Track. Empower.</p>

    <a class="btn" id="ios-btn" href="https://apps.apple.com/in/app/wern-walk-track-empower/id6761259828">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09M12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25"/></svg>
      Download on the App Store
    </a>

    <a class="btn" id="android-btn" href="https://play.google.com/store/apps/details?id=com.wern.app&hl=en_IN">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zM14.5 12.707l2.302 2.302-10.758 6.186c-.23.132-.49.178-.752.132L14.5 12.707zM19.5 9.5c1 .6 1 2.4 0 3l-2.76 1.585-2.5-2.585 2.5-2.585L19.5 9.5zM5.292 2.673c.262-.046.522 0 .752.132l10.758 6.186-2.302 2.302L5.292 2.673z"/></svg>
      Get it on Google Play
    </a>

    <p class="redirecting" id="msg"></p>

    <footer>&copy; Project Liberté — WERN</footer>
  </div>

<script>
(function() {
  var ua = (navigator.userAgent || navigator.vendor || window.opera || '').toLowerCase();
  var IOS_URL = 'https://apps.apple.com/in/app/wern-walk-track-empower/id6761259828';
  var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.wern.app&hl=en_IN';

  // Detect platform
  var isIOS = /iphone|ipad|ipod/.test(ua) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPad on iOS 13+
  var isAndroid = /android/.test(ua);

  var target = null;
  if (isIOS) target = IOS_URL;
  else if (isAndroid) target = ANDROID_URL;

  if (target) {
    document.getElementById('msg').textContent = 'Opening the store…';
    // Short delay so users see the page before the redirect.
    setTimeout(function() { window.location.replace(target); }, 600);
  } else {
    // Desktop / unknown — show both buttons, no auto-redirect.
    document.getElementById('msg').textContent = 'Choose your platform above.';
  }
})();
</script>
</body>
</html>
